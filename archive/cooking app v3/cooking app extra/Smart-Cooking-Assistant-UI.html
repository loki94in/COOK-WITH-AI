<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Cooking Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0D0D0D;
            --bg-card: #1A1A1A;
            --bg-elevated: #242424;
            --primary: #FF6F00;
            --primary-light: #FFB74D;
            --secondary: #FFB300;
            --accent: #FF9800;
            --success: #4CAF50;
            --warning: #F44336;
            --text-primary: #FFFFFF;
            --text-secondary: #A0A0A0;
            --text-muted: #606060;
            --border: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Mobile Container */
        .phone-frame {
            max-width: 420px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--bg-dark);
            position: relative;
            overflow: hidden;
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 12px 20px;
            font-size: 12px;
            font-weight: 500;
            background: transparent;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .status-bar span {
            opacity: 0.9;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .logo-text {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header-right {
            display: flex;
            gap: 16px;
        }

        .header-icon {
            width: 40px;
            height: 40px;
            background: var(--bg-card);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .header-icon:hover {
            background: var(--bg-elevated);
        }

        /* Wake Word Button */
        .wake-word-section {
            padding: 0 20px;
            margin-bottom: 24px;
        }

        .wake-word-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), #FF8F00);
            border: none;
            border-radius: 20px;
            padding: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .wake-word-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            100% { left: 100%; }
        }

        .wake-word-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 32px rgba(255, 111, 0, 0.4);
        }

        .wake-word-btn .mic-icon {
            width: 56px;
            height: 56px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .wake-word-text {
            text-align: left;
        }

        .wake-word-text h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .wake-word-text span {
            font-size: 13px;
            opacity: 0.9;
        }

        /* URL Input Section */
        .url-section {
            padding: 0 20px;
            margin-bottom: 28px;
        }

        .section-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .url-input-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid var(--border);
        }

        .url-input-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }

        .yt-badge {
            width: 40px;
            height: 40px;
            background: #FF0000;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .url-input {
            flex: 1;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 14px;
            color: var(--text-primary);
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .url-input::placeholder {
            color: var(--text-muted);
        }

        .url-input:focus {
            border-color: var(--primary);
        }

        .extract-btn {
            width: 100%;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 14px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .extract-btn:hover {
            background: #E65100;
        }

        /* Quick Actions */
        .quick-actions {
            padding: 0 20px;
            margin-bottom: 28px;
        }

        .actions-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .action-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .action-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .action-icon {
            width: 48px;
            height: 48px;
            background: var(--bg-elevated);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin: 0 auto 12px;
        }

        .action-card:nth-child(1) .action-icon { color: #4CAF50; }
        .action-card:nth-child(2) .action-icon { color: var(--primary); }
        .action-card:nth-child(3) .action-icon { color: var(--secondary); }

        .action-card h4 {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .action-card span {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Recipe Card */
        .recipe-section {
            padding: 0 20px;
            margin-bottom: 28px;
        }

        .recipe-card {
            background: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s;
        }

        .recipe-card:hover {
            transform: scale(1.01);
        }

        .recipe-thumbnail {
            width: 100%;
            height: 160px;
            background: linear-gradient(135deg, #2D2D2D, #1A1A1A);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .recipe-thumbnail .play-btn {
            width: 56px;
            height: 56px;
            background: rgba(255,255,255,0.95);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--bg-dark);
        }

        .recipe-duration {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0,0,0,0.7);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .recipe-info {
            padding: 16px;
        }

        .recipe-info h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .recipe-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 12px;
        }

        .recipe-meta span {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .recipe-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag {
            background: var(--bg-elevated);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            color: var(--primary-light);
        }

        .tag.green { color: var(--success); }

        /* Timers Section */
        .timers-section {
            padding: 0 20px;
            margin-bottom: 28px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .section-header h3 {
            font-size: 16px;
            font-weight: 700;
        }

        .see-all {
            font-size: 13px;
            color: var(--primary);
            font-weight: 500;
            cursor: pointer;
        }

        .timer-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 12px;
            border-left: 4px solid var(--primary);
        }

        .timer-card:nth-child(2) { border-left-color: var(--secondary); }
        .timer-card:nth-child(3) { border-left-color: var(--success); }

        .timer-icon {
            width: 48px;
            height: 48px;
            background: var(--bg-elevated);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .timer-details {
            flex: 1;
        }

        .timer-details h4 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .timer-details span {
            font-size: 12px;
            color: var(--text-muted);
        }

        .timer-countdown {
            font-size: 22px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .timer-controls {
            display: flex;
            gap: 8px;
        }

        .timer-btn {
            width: 36px;
            height: 36px;
            background: var(--bg-elevated);
            border: none;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .timer-btn:hover {
            background: var(--primary);
        }

        /* Voice Hint */
        .voice-hint {
            background: linear-gradient(135deg, rgba(255,111,0,0.15), rgba(255,179,0,0.1));
            border: 1px solid rgba(255,111,0,0.3);
            border-radius: 14px;
            padding: 14px 18px;
            margin: 0 20px 28px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .voice-hint i {
            color: var(--primary);
            font-size: 18px;
        }

        .voice-hint span {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .voice-hint strong {
            color: var(--primary-light);
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 420px;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            padding: 12px 24px 28px;
            display: flex;
            justify-content: space-around;
            backdrop-filter: blur(20px);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            opacity: 0.6;
            transition: all 0.2s;
        }

        .nav-item.active {
            opacity: 1;
        }

        .nav-item.active i {
            color: var(--primary);
        }

        .nav-item i {
            font-size: 20px;
            margin-bottom: 2px;
        }

        .nav-item span {
            font-size: 10px;
            font-weight: 500;
        }

        /* ============================================
           COOKING MODE SCREEN
           ============================================ */

        .screen {
            display: none;
            padding-bottom: 100px;
        }

        .screen.active {
            display: block;
        }

        /* Cooking Mode Header */
        .cooking-header {
            padding: 0 20px 20px;
            text-align: center;
        }

        .cooking-header h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .cooking-header span {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Step Progress */
        .step-progress {
            padding: 0 20px;
            margin-bottom: 24px;
        }

        .progress-bar {
            height: 6px;
            background: var(--bg-card);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-fill {
            height: 100%;
            width: 37%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .progress-steps {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
        }

        .progress-steps span.current {
            color: var(--primary);
            font-weight: 600;
        }

        /* Current Step Card */
        .step-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 28px 24px;
            margin: 0 20px 20px;
            border: 1px solid var(--border);
        }

        .step-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: var(--primary);
            border-radius: 50%;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .step-card h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .step-card p {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .step-timer {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-elevated);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
        }

        .step-timer i {
            color: var(--secondary);
            font-size: 18px;
        }

        .step-timer span {
            font-size: 16px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .step-actions {
            display: flex;
            gap: 10px;
        }

        .step-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .step-btn.primary {
            background: var(--primary);
            color: white;
        }

        .step-btn.secondary {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        /* Ingredient Quick View */
        .ingredient-panel {
            background: var(--bg-card);
            border-radius: 20px;
            margin: 0 20px 20px;
            overflow: hidden;
        }

        .panel-header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .panel-header h4 {
            font-size: 14px;
            font-weight: 600;
        }

        .panel-header span {
            font-size: 12px;
            color: var(--primary);
            cursor: pointer;
        }

        .ingredient-list {
            padding: 12px 20px 16px;
        }

        .ingredient-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .ingredient-item:last-child {
            border-bottom: none;
        }

        .ingredient-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
        }

        .ingredient-name {
            flex: 1;
            font-size: 14px;
        }

        .ingredient-amount {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Voice Cooking Controls */
        .voice-controls {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 16px;
        }

        .voice-fab {
            width: 56px;
            height: 56px;
            background: var(--primary);
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255,111,0,0.4);
            transition: all 0.2s;
        }

        .voice-fab.listening {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .voice-fab.secondary {
            background: var(--bg-card);
            width: 48px;
            height: 48px;
            font-size: 16px;
        }

        /* ============================================
           PANTRY SCREEN
           ============================================ */

        .pantry-header {
            padding: 0 20px 20px;
        }

        .pantry-header h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .pantry-header p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .search-bar {
            padding: 0 20px;
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px 14px 46px;
            font-size: 14px;
            color: var(--text-primary);
            font-family: inherit;
            outline: none;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-wrapper {
            position: relative;
        }

        .search-wrapper i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .category-tabs {
            padding: 0 20px;
            margin-bottom: 20px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .category-tabs::-webkit-scrollbar {
            display: none;
        }

        .tabs-row {
            display: flex;
            gap: 10px;
            min-width: max-content;
        }

        .tab {
            padding: 10px 18px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .pantry-grid {
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .pantry-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 18px;
            position: relative;
            overflow: hidden;
        }

        .pantry-card .card-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }

        .pantry-card h4 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .pantry-card span {
            font-size: 12px;
            color: var(--text-muted);
        }

        .pantry-card .card-bg {
            position: absolute;
            right: -10px;
            bottom: -10px;
            font-size: 60px;
            opacity: 0.08;
        }

        /* ============================================
           TIMERS SCREEN
           ============================================ */

        .timers-header {
            padding: 0 20px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .timers-header h2 {
            font-size: 22px;
            font-weight: 700;
        }

        .add-timer-btn {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-timer-btn:hover {
            transform: scale(1.05);
        }

        .active-timers {
            padding: 0 20px;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .large-timer-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 14px;
            position: relative;
            overflow: hidden;
        }

        .large-timer-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .timer-header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .timer-title {
            font-size: 18px;
            font-weight: 700;
        }

        .timer-type {
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg-elevated);
            padding: 4px 10px;
            border-radius: 8px;
        }

        .timer-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 6px solid var(--bg-elevated);
            display: flex;
            align-items: center;

        .ingredient-list {
            padding: 12px 20px 16px;
        }

        .ingredient-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .ingredient-item:last-child {
            border-bottom: none;
        }

        .ingredient-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
        }

        .ingredient-name {
            flex: 1;
            font-size: 14px;
        }

        .ingredient-amount {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Voice Cooking Controls */
        .voice-controls {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 16px;
        }

        .voice-fab {
            width: 56px;
            height: 56px;
            background: var(--primary);
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255,111,0,0.4);
            transition: all 0.2s;
        }

        .voice-fab.listening {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .voice-fab.secondary {
            background: var(--bg-card);
            width: 48px;
            height: 48px;
            font-size: 16px;
        }

        /* ============================================
           PANTRY SCREEN
           ============================================ */

        .pantry-header {
            padding: 0 20px 20px;
        }

        .pantry-header h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .pantry-header p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .search-bar {
            padding: 0 20px;
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px 14px 46px;
            font-size: 14px;
            color: var(--text-primary);
            font-family: inherit;
            outline: none;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-wrapper {
            position: relative;
        }

        .search-wrapper i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .category-tabs {
            padding: 0 20px;
            margin-bottom: 20px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .category-tabs::-webkit-scrollbar {
            display: none;
        }

        .tabs-row {
            display: flex;
            gap: 10px;
            min-width: max-content;
        }

        .tab {
            padding: 10px 18px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .pantry-grid {
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .pantry-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 18px;
            position: relative;
            overflow: hidden;
        }

        .pantry-card .card-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }

        .pantry-card h4 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .pantry-card span {
            font-size: 12px;
            color: var(--text-muted);
        }

        .pantry-card .card-bg {
            position: absolute;
            right: -10px;
            bottom: -10px;
            font-size: 60px;
            opacity: 0.08;
        }

        /* ============================================
           TIMERS SCREEN
           ============================================ */

        .timers-header {
            padding: 0 20px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .timers-header h2 {
            font-size: 22px;
            font-weight: 700;
        }

        .add-timer-btn {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-timer-btn:hover {
            transform: scale(1.05);
        }

        .active-timers {
            padding: 0 20px;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .large-timer-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 14px;
            position: relative;
            overflow: hidden;
        }

        .large-timer-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .timer-header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .timer-title {
            font-size: 18px;
            font-weight: 700;
        }

        .timer-type {
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg-elevated);
            padding: 4px 10px;
            border-radius: 8px;
        }

        .timer-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 6px solid var(--bg-elevated);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            position: relative;
        }

        .timer-circle::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid transparent;
            border-top-color: var(--primary);
            transform: rotate(45deg);
        }

        .timer-circle .time {
            font-size: 36px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .timer-actions-row {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .timer-action-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .timer-action-btn.primary {
            background: var(--primary);
            color: white;
        }

        .timer-action-btn.secondary {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        /* ============================================
           RECIPE DETAIL SCREEN
           ============================================ */

        .recipe-detail-hero {
            width: 100%;
            height: 240px;
            background: linear-gradient(135deg, #2D2D2D, #1A1A1A);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .recipe-detail-hero .play-btn {
            width: 64px;
            height: 64px;
            background: rgba(255,255,255,0.95);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--bg-dark);
        }

        .recipe-detail-hero .duration {
            position: absolute;
            bottom: 16px;
            right: 16px;
            background: rgba(0,0,0,0.8);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
        }

        .back-btn {
            position: absolute;
            top: 16px;
            left: 16px;
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .recipe-detail-content {
            padding: 24px 20px;
            margin-top: -20px;
            background: var(--bg-dark);
            border-radius: 24px 24px 0 0;
            position: relative;
        }

        .recipe-detail-content h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .recipe-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .recipe-stat {
            text-align: center;
        }

        .recipe-stat .value {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
        }

        .recipe-stat .label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .portion-selector {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .portion-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .portion-header h4 {
            font-size: 14px;
            font-weight: 600;
        }

        .portion-buttons {
            display: flex;
            gap: 8px;
        }

        .portion-btn {
            padding: 8px 14px;
            background: var(--bg-elevated);
            border: 2px solid transparent;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .portion-btn.active {
            border-color: var(--primary);
            color: var(--primary);
        }

        .detail-section {
            margin-bottom: 24px;
        }

        .detail-section h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 14px;
        }

        .start-cooking-btn {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 380px;
            padding: 16px;
            background: var(--primary);
            border: none;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 24px rgba(255,111,0,0.4);
            transition: all 0.2s;
        }

        .start-cooking-btn:hover {
            transform: translateX(-50%) scale(1.02);
        }

        /* ============================================
           MISTAKE FIX MODAL
           ============================================ */

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: flex-end;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .fix-modal {
            width: 100%;
            max-width: 420px;
            background: var(--bg-card);
            border-radius: 24px 24px 0 0;
            padding: 28px 24px 40px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-handle {
            width: 40px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 0 auto 20px;
        }

        .fix-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 20px;
        }

        .fix-icon {
            width: 52px;
            height: 52px;
            background: rgba(244,67,54,0.15);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .fix-header h3 {
            font-size: 18px;
            font-weight: 700;
        }

        .fix-header span {
            font-size: 13px;
            color: var(--text-muted);
        }

        .fix-steps {
            margin-bottom: 20px;
        }

        .fix-step {
            display: flex;
            gap: 14px;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
        }

        .fix-step:last-child {
            border-bottom: none;
        }

        .fix-step-num {
            width: 28px;
            height: 28px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .fix-step-text {
            font-size: 14px;
            line-height: 1.5;
        }

        .fix-timer-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 14px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* ============================================
             SCREEN 6: RECIPES LIBRARY
             ============================================ */
        .screen {
            display: none;
            padding-bottom: 100px;
        }

        .screen.active {
            display: block;
        }

        .recipes-header {
            padding: 20px;
        }

        .recipes-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .recipes-title-row h2 {
            font-size: 24px;
            font-weight: 700;
        }

        .search-icon-btn {
            width: 40px;
            height: 40px;
            background: var(--bg-card);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .recipes-filter-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .filter-tab {
            padding: 8px 16px;
            background: var(--bg-card);
            border: none;
            border-radius: 24px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .filter-tab.active {
            background: var(--primary);
            color: white;
        }

        .recipes-grid {
            padding: 0 20px 120px;
        }

        .recipe-list-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 14px;
            display: flex;
            gap: 14px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .recipe-list-card:hover {
            background: var(--bg-elevated);
        }

        .list-thumb {
            width: 80px;
            height: 80px;
            background: var(--bg-elevated);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            flex-shrink: 0;
        }

        .thumb-placeholder {
            font-size: 32px;
        }

        .list-duration {
            position: absolute;
            bottom: 6px;
            right: 6px;
            background: rgba(0,0,0,0.7);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
        }

        .list-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .list-info h4 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .list-meta {
            display: flex;
            gap: 12px;
            margin-bottom: 8px;
        }

        .list-meta span {
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .list-tags {
            display: flex;
            gap: 6px;
        }

        .list-tag {
            background: var(--bg-elevated);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 500;
            color: var(--primary-light);
        }

        .list-tag.veg {
            color: var(--success);
        }

        /* ============================================
             SCREEN 7: PROFILE
             ============================================ */
        .screen {
            display: none;
            padding-bottom: 100px;
        }

        .screen.active {
            display: block;
        }

        .profile-header-section {
            position: relative;
        }

        .profile-cover {
            height: 120px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }

        .profile-avatar-section {
            display: flex;
            align-items: flex-end;
            padding: 0 20px;
            margin-top: -50px;
            gap: 16px;
        }

        .profile-avatar {
            width: 90px;
            height: 90px;
            background: var(--bg-card);
            border-radius: 50%;
            border: 4px solid var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .profile-info {
            padding-top: 50px;
            flex: 1;
        }

        .profile-info h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .profile-email {
            font-size: 13px;
            color: var(--text-secondary);
            display: block;
            margin-bottom: 10px;
        }

        .profile-badges {
            display: flex;
            gap: 8px;
        }

        .badge {
            background: var(--bg-card);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }

        .profile-stats-row {
            display: flex;
            justify-content: space-around;
            padding: 24px 20px;
            margin: 16px 0;
            background: var(--bg-card);
            border-radius: 16px;
            margin: 16px 20px;
        }

        .profile-stat {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: 4px;
        }

        .profile-menu-section {
            padding: 0 20px;
            margin-bottom: 16px;
        }

        .profile-menu-section:last-of-type {
            margin-bottom: 30px;
        }

        .profile-menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: var(--bg-card);
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .profile-menu-item:hover {
            background: var(--bg-elevated);
        }

        .profile-menu-item:active {
            background: var(--bg-elevated);
            transform: scale(0.98);
        }

        .menu-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .menu-left i {
            font-size: 18px;
            color: var(--primary);
            width: 24px;
            text-align: center;
        }

        .menu-left span {
            font-size: 14px;
            font-weight: 500;
        }

        .menu-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .diet-tag, .family-tag {
            font-size: 12px;
            color: var(--text-muted);
            background: var(--bg-elevated);
            padding: 4px 10px;
            border-radius: 8px;
        }

        .menu-right i {
            font-size: 14px;
            color: var(--text-muted);
        }

        .logout-btn {
            display: block;
            width: calc(100% - 40px);
            margin: 0 auto 30px;
            padding: 16px;
            background: var(--bg-card);
            border: 1px solid var(--warning);
            border-radius: 12px;
            color: var(--warning);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: var(--warning);
            color: white;
        }

        /* Preference Panel Modal */
        .pref-modal {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-card);
            border-radius: 24px 24px 0 0;
            padding: 0;
            max-width: 420px;
            margin: 0 auto;
            z-index: 1000;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .pref-modal.active {
            transform: translateY(0);
        }

        .pref-modal-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .pref-modal-header h3 {
            font-size: 16px;
            font-weight: 700;
        }

        .pref-modal-header i {
            font-size: 20px;
            color: var(--text-muted);
        }

        .pref-modal-body {
            padding: 20px;
        }

        .pref-modal-body h4 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .pref-modal-body p {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .pref-modal-footer {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border);
        }

        .pref-modal-footer button {
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pref-modal-footer button:hover {
            background: var(--primary);
            color: white;
        }

        .pref-modal-footer button.cancel {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        /* ============================================
             SCREEN 8: HELP & SUPPORT
             ============================================ */
        .screen {
            display: none;
            padding-bottom: 100px;
        }

        .screen.active {
            display: block;
        }

        .help-header {
            padding: 20px;
        }

        .help-header h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .help-header p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .help-section {
            padding: 20px;
        }

        .help-section h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .profile-header-section {

        }

        .profile-cover {

        .profile-avatar-section {

            padding: 0 20px;

            gap: 16px;

        .profile-avatar {

            height: 90px;
            background: var(--bg-card);

        .profile-info {

        }

        .profile-info h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;

        .profile-email {
            font-size: 13px;
            color: var(--text-secondary);

            margin-bottom: 10px;
        }

        .profile-badges {

        .badge {
            background: var(--bg-card);

            border-radius: 20px;

        .profile-stats-row {

        .profile-stat {

        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);

        .profile-menu-section {

            margin-bottom: 16px;

            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: var(--bg-card);
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .profile-menu-item:hover {
            background: var(--bg-elevated);
        }

        .profile-menu-item:active {
            background: var(--bg-elevated);
            transform: scale(0.98);
        }

        .menu-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .menu-left i {
            font-size: 18px;
            color: var(--primary);
            width: 24px;
            text-align: center;
        }

        .menu-left span {
            font-size: 14px;
            font-weight: 500;
        }

        .menu-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

            font-size: 12px;
            color: var(--text-muted);
            background: var(--bg-elevated);
            padding: 4px 10px;
            border-radius: 8px;

            font-size: 14px;
            color: var(--text-muted);
        }

        .logout-btn {
            display: block;
            width: calc(100% - 40px);
            margin: 0 auto 30px;
            padding: 16px;
            background: var(--bg-card);
            border: 1px solid var(--warning);
            border-radius: 12px;
            color: var(--warning);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: var(--warning);
            color: white;
        }

        /* Preference Panel Modal */
        .pref-modal {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-card);
            border-radius: 24px 24px 0 0;
            padding: 0;
            max-width: 420px;
            margin: 0 auto;
            z-index: 1000;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .pref-modal.active {
            transform: translateY(0);
        }

        .pref-modal-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .pref-modal-header h3 {
            font-size: 16px;
            font-weight: 700;
        }

        .pref-modal-header i {
            font-size: 20px;
            color: var(--text-muted);
        }

        .pref-modal-body {
            padding: 20px;
        }

        .pref-modal-body h4 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .pref-modal-body p {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .pref-modal-footer {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border);
        }

        .pref-modal-footer button {
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pref-modal-footer button:hover {
            background: var(--primary);
            color: white;
        }

        .pref-modal-footer button.cancel {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        /* ============================================
             SCREEN 8: HELP & SUPPORT
             ============================================ */
        .screen {
            display: none;
            padding-bottom: 100px;
        }

        .screen.active {
            display: block;
        }

        .help-header {
            padding: 20px;
        }

        .help-header h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .help-header p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .help-section {
            padding: 20px;
        }

        .help-section h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .help-section p {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .help-section ul {
            margin-bottom: 16px;
        }

        .help-section li {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .help-section a {
            font-size: 13px;
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
        }

        .help-section a:hover {
            color: var(--primary-light);
        }

        /* ============================================
             SCREEN 9: ABOUT APP
             ============================================ */
        .screen {
            display: none;
            padding-bottom: 100px;
        }

        .screen.active {
            display: block;
        }

        .about-header {
            padding: 20px;
        }

        .about-header h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .about-header p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .about-section {
            padding: 20px;
        }

        .about-section h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .about-section p {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .about-section ul {
            margin-bottom: 16px;
        }

        .about-section li {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .about-section a {
            font-size: 13px;
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
        }

        .about-section a:hover {
            color: var(--primary-light);
        }

        /* Screen Switcher (Demo) */
        .screen-switcher {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-card);
            border-radius: 24px 24px 0 0;
            padding: 12px 24px 28px;
            display: flex;
            justify-content: space-around;
            backdrop-filter: blur(20px);
        }

        .screen-switcher button {
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            color: var(--text-secondary);
        }

        .screen-switcher button:hover {
            background: var(--bg-elevated);
        }

        .screen-switcher button.active {
            background: var(--primary);
            color: white;
        }

        /* ============================================
           COOKING MODE SCREEN
           ============================================ */

        .screen {
            display: none;
            padding-bottom: 100px;
        }

        .screen.active {
            display: block;
        }

        /* Cooking Mode Header */
        .cooking-header {
            padding: 0 20px 20px;
            text-align: center;
        }

        .cooking-header h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .cooking-header span {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Step Progress */
        .step-progress {
            padding: 0 20px;
            margin-bottom: 24px;
        }

        .progress-bar {
            height: 6px;
            background: var(--bg-card);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-fill {
            height: 100%;
            width: 37%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .progress-steps {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
        }

        .progress-steps span.current {
            color: var(--primary);
            font-weight: 600;
        }

        /* Current Step Card */
        .step-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 28px 24px;
            margin: 0 20px 20px;
            border: 1px solid var(--border);
        }

        .step-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: var(--primary);
            border-radius: 50%;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .step-card h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .step-card p {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .step-timer {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-elevated);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
        }

        .step-timer i {
            color: var(--secondary);
            font-size: 18px;
        }

        .step-timer span {
            font-size: 16px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .step-actions {
            display: flex;
            gap: 10px;
        }

        .step-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .step-btn.primary {
            background: var(--primary);
            color: white;
        }

        .step-btn.secondary {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        /* Ingredient Quick View */
        .ingredient-panel {
            background: var(--bg-card);
            border-radius: 20px;
            margin: 0 20px 20px;
            overflow: hidden;
        }

        .panel-header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .panel-header h4 {
            font-size: 14px;
            font-weight: 600;
        }

        .panel-header span {
            font-size: 12px;
            color: var(--primary);
            cursor: pointer;
        }

        .ingredient-list {
            padding: 12px 20px 16px;
        }

        .ingredient-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .ingredient-item:last-child {
            border-bottom: none;
        }

        .ingredient-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
        }

        .ingredient-name {
            flex: 1;
            font-size: 14px;
        }

        .ingredient-amount {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Voice Cooking Controls */
        .voice-controls {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 16px;
        }

        .voice-fab {
            width: 56px;
            height: 56px;
            background: var(--primary);
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255,111,0,0.4);
            transition: all 0.2s;
        }

        .voice-fab.listening {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .voice-fab.secondary {
            background: var(--bg-card);
            width: 48px;
            height: 48px;
            font-size: 16px;
        }

        /* ============================================
           PANTRY SCREEN
           ============================================ */

        .pantry-header {
            padding: 0 20px 20px;
        }

        .pantry-header h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .pantry-header p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .search-bar {
            padding: 0 20px;
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px 14px 46px;
            font-size: 14px;
            color: var(--text-primary);
            font-family: inherit;
            outline: none;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-wrapper {
            position: relative;
        }

        .search-wrapper i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .category-tabs {
            padding: 0 20px;
            margin-bottom: 20px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .category-tabs::-webkit-scrollbar {
            display: none;
        }

        .tabs-row {
            display: flex;
            gap: 10px;
            min-width: max-content;
        }

        .tab {
            padding: 10px 18px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;

        .tab.active {

            border-color: var(--primary);
            color: white;
        }

        .pantry-grid {
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;

        .pantry-card {

        .pantry-card h4 {

            font-weight: 600;

        .pantry-card span {
            font-size: 12px;
            color: var(--text-muted);
        }

        .pantry-card .card-bg {
            position: absolute;
            right: -10px;
