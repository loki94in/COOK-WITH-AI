            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .step-timer {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-elevated);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
        }

        .step-timer i {
            color: var(--secondary);
            font-size: 18px;
        }

        .step-timer span {
            font-size: 16px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .step-actions {
            display: flex;
            gap: 10px;
        }

        .step-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .step-btn.primary {
            background: var(--primary);
            color: white;
        }

        .step-btn.secondary {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        /* Ingredient Quick View */
        .ingredient-panel {
            background: var(--bg-card);
            border-radius: 20px;
            margin: 0 20px 20px;
            overflow: hidden;
        }

        .panel-header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .panel-header h4 {
            font-size: 14px;
            font-weight: 600;
        }

        .panel-header span {
            font-size: 12px;
            color: var(--primary);
            cursor: pointer;
        }

        .ingredient-list {
            padding: 12px 20px 16px;
        }

        .ingredient-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .ingredient-item:last-child {
            border-bottom: none;
        }

        .ingredient-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
        }

        .ingredient-name {
            flex: 1;
            font-size: 14px;
        }

        .ingredient-amount {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Voice Cooking Controls */
        .voice-controls {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 16px;
        }

        .voice-fab {
            width: 56px;
            height: 56px;
            background: var(--primary);
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255,111,0,0.4);
            transition: all 0.2s;
        }

        .voice-fab.listening {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .voice-fab.secondary {
            background: var(--bg-card);
            width: 48px;
            height: 48px;
            font-size: 16px;
        }

        /* ============================================
           PANTRY SCREEN
           ============================================ */

        .pantry-header {
            padding: 0 20px 20px;
        }

        .pantry-header h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .pantry-header p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .search-bar {
            padding: 0 20px;
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px 14px 46px;
            font-size: 14px;
            color: var(--text-primary);
            font-family: inherit;
            outline: none;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-wrapper {
            position: relative;
        }

        .search-wrapper i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .category-tabs {
            padding: 0 20px;
            margin-bottom: 20px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .category-tabs::-webkit-scrollbar {
            display: none;
        }

        .tabs-row {
            display: flex;
            gap: 10px;
            min-width: max-content;
        }

        .tab {
            padding: 10px 18px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .pantry-grid {
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .pantry-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 18px;
            position: relative;
            overflow: hidden;
        }

        .pantry-card .card-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }

        .pantry-card h4 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .pantry-card span {
            font-size: 12px;
            color: var(--text-muted);
        }

        .pantry-card .card-bg {
            position: absolute;
            right: -10px;
            bottom: -10px;
            font-size: 60px;
            opacity: 0.08;
        }

        /* ============================================
           TIMERS SCREEN
           ============================================ */

        .timers-header {
            padding: 0 20px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .timers-header h2 {
            font-size: 22px;
            font-weight: 700;
        }

        .add-timer-btn {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-timer-btn:hover {
            transform: scale(1.05);
        }

        .active-timers {
            padding: 0 20px;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .large-timer-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 14px;
            position: relative;
            overflow: hidden;
        }

        .large-timer-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .timer-header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .timer-title {
            font-size: 18px;
            font-weight: 700;
        }

        .timer-type {
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg-elevated);
            padding: 4px 10px;
            border-radius: 8px;
        }

        .timer-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 6px solid var(--bg-elevated);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            position: relative;
        }

        .timer-circle::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid transparent;
            border-top-color: var(--primary);
            transform: rotate(45deg);
        }

        .timer-circle .time {
            font-size: 36px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .timer-actions-row {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .timer-action-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .timer-action-btn.primary {
            background: var(--primary);
            color: white;
        }

        .timer-action-btn.secondary {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        /* ============================================
           RECIPE DETAIL SCREEN
           ============================================ */

        .recipe-detail-hero {
            width: 100%;
            height: 240px;
            background: linear-gradient(135deg, #2D2D2D, #1A1A1A);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .recipe-detail-hero .play-btn {
            width: 64px;
            height: 64px;
            background: rgba(255,255,255,0.95);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--bg-dark);
        }

        .recipe-detail-hero .duration {
            position: absolute;
            bottom: 16px;
            right: 16px;
            background: rgba(0,0,0,0.8);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
        }

        .back-btn {
            position: absolute;
            top: 16px;
            left: 16px;
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .recipe-detail-content {
            padding: 24px 20px;
            margin-top: -20px;
            background: var(--bg-dark);
            border-radius: 24px 24px 0 0;
            position: relative;
        }

        .recipe-detail-content h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .recipe-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .recipe-stat {
            text-align: center;
        }

        .recipe-stat .value {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
        }

        .recipe-stat .label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .portion-selector {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .portion-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .portion-header h4 {
            font-size: 14px;
            font-weight: 600;
        }

        .portion-buttons {
            display: flex;
            gap: 8px;
        }

        .portion-btn {
            padding: 8px 14px;
            background: var(--bg-elevated);
            border: 2px solid transparent;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .portion-btn.active {
            border-color: var(--primary);
            color: var(--primary);
        }

        .detail-section {
            margin-bottom: 24px;
        }

        .detail-section h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 14px;
        }

        .start-cooking-btn {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 380px;
            padding: 16px;
            background: var(--primary);
            border: none;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 24px rgba(255,111,0,0.4);
            transition: all 0.2s;
        }

        .start-cooking-btn:hover {
            transform: translateX(-50%) scale(1.02);
        }

        /* ============================================
           MISTAKE FIX MODAL
           ============================================ */

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: flex-end;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .fix-modal {
            width: 100%;
            max-width: 420px;
            background: var(--bg-card);
            border-radius: 24px 24px 0 0;
            padding: 28px 24px 40px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-handle {
            width: 40px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 0 auto 20px;
        }

        .fix-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 20px;
        }

        .fix-icon {
            width: 52px;
            height: 52px;
            background: rgba(244,67,54,0.15);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .fix-header h3 {
            font-size: 18px;
            font-weight: 700;
        }

        .fix-header span {
            font-size: 13px;
            color: var(--text-muted);
        }

        .fix-steps {
            margin-bottom: 20px;
        }

        .fix-step {
            display: flex;
            gap: 14px;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
        }

        .fix-step:last-child {
            border-bottom: none;
        }

        .fix-step-num {
            width: 28px;
            height: 28px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .fix-step-text {
            font-size: 14px;
            line-height: 1.5;
        }

        .fix-timer-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 14px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* ============================================
             SCREEN 6: RECIPES LIBRARY
             ============================================ */
        .screen {
            display: none;
            padding-bottom: 100px;
        }

        .screen.active {
            display: block;
        }

        .recipes-header {
            padding: 20px;
        }

        .recipes-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .recipes-title-row h2 {
            font-size: 24px;
            font-weight: 700;
        }

        .search-icon-btn {
            width: 40px;
            height: 40px;
            background: var(--bg-card);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .recipes-filter-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .filter-tab {
            padding: 8px 16px;
            background: var(--bg-card);
            border: none;
            border-radius: 24px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .filter-tab.active {
            background: var(--primary);
            color: white;
        }

        .recipes-grid {
            padding: 0 20px 120px;
        }

        .recipe-list-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 14px;
            display: flex;
            gap: 14px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .recipe-list-card:hover {
            background: var(--bg-elevated);
        }

        .list-thumb {
            width: 80px;
            height: 80px;
            background: var(--bg-elevated);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            flex-shrink: 0;
        }

        .thumb-placeholder {
            font-size: 32px;
        }

        .list-duration {
            position: absolute;
            bottom: 6px;
            right: 6px;
            background: rgba(0,0,0,0.7);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
        }

        .list-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .list-info h4 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .list-meta {
            display: flex;
            gap: 12px;
            margin-bottom: 8px;
        }

        .list-meta span {
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .list-tags {
            display: flex;
            gap: 6px;
        }

        .list-tag {
            background: var(--bg-elevated);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 500;
            color: var(--primary-light);
        }

        .list-tag.veg {
            color: var(--success);
        }

        /* ============================================
             SCREEN 7: PROFILE
             ============================================ */
        .screen {
            display: none;
            padding-bottom: 100px;
        }

        .screen.active {
            display: block;
        }

        .profile-header-section {
            position: relative;
        }

        .profile-cover {
            height: 120px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }

        .profile-avatar-section {
            display: flex;
            align-items: flex-end;
            padding: 0 20px;
            margin-top: -50px;
            gap: 16px;
        }

        .profile-avatar {
            width: 90px;
            height: 90px;
            background: var(--bg-card);
            border-radius: 50%;
            border: 4px solid var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .profile-info {
            padding-top: 50px;
            flex: 1;
        }

        .profile-info h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .profile-email {
            font-size: 13px;
            color: var(--text-secondary);
            display: block;
            margin-bottom: 10px;
        }

        .profile-badges {
            display: flex;
            gap: 8px;
        }

        .badge {
            background: var(--bg-card);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }

        .profile-stats-row {
            display: flex;
            justify-content: space-around;
            padding: 24px 20px;
            margin: 16px 0;
            background: var(--bg-card);
            border-radius: 16px;
            margin: 16px 20px;
        }

        .profile-stat {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: 4px;
        }

        .profile-menu-section {
            padding: 0 20px;
            margin-bottom: 16px;
        }

        .profile-menu-section:last-of-type {
            margin-bottom: 30px;
        }

        .profile-menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: var(--bg-card);
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .profile-menu-item:hover {
            background: var(--bg-elevated);
        }

        .profile-menu-item:active {
            background: var(--bg-elevated);
            transform: scale(0.98);
        }

        .menu-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .menu-left i {
            font-size: 18px;
            color: var(--primary);
            width: 24px;
            text-align: center;
        }

        .menu-left span {
            font-size: 14px;
            font-weight: 500;
        }

        .menu-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .diet-tag, .family-tag {
            font-size: 12px;
            color: var(--text-muted);
            background: var(--bg-elevated);
            padding: 4px 10px;
            border-radius: 8px;
        }

        .menu-right i {
            font-size: 14px;
            color: var(--text-muted);
        }

        .logout-btn {
            display: block;
            width: calc(100% - 40px);
            margin: 0 auto 30px;
            padding: 16px;
            background: var(--bg-card);
            border: 1px solid var(--warning);
            border-radius: 12px;
            color: var(--warning);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: var(--warning);
            color: white;
        }

        /* Preference Panel Modal */
        .pref-modal {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-card);
            border-radius: 24px 24px 0 0;
            padding: 0;
            max-width: 420px;
            margin: 0 auto;
            z-index: 1000;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .pref-modal.active {
            transform: translateY(0);
        }

        .pref-modal-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .pref-modal-header h3 {
            font-size: 16px;
            font-weight: 700;
        }

        .pref-modal-header i {
            font-size: 20px;

        .cooking-header h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .cooking-header span {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Step Progress */
        .step-progress {
            padding: 0 20px;
            margin-bottom: 24px;
        }

        .progress-bar {
            height: 6px;
            background: var(--bg-card);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-fill {
            height: 100%;
            width: 37%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .progress-steps {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
        }

        .progress-steps span.current {
            color: var(--primary);
            font-weight: 600;
        }

        /* Current Step Card */
        .step-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 28px 24px;
            margin: 0 20px 20px;
            border: 1px solid var(--border);
        }

        .step-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: var(--primary);
            border-radius: 50%;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .step-card h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .step-card p {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .step-timer {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-elevated);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
        }

        .step-timer i {
            color: var(--secondary);
            font-size: 18px;
        }

        .step-timer span {
            font-size: 16px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .step-actions {
            display: flex;
            gap: 10px;
        }

        .step-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .step-btn.primary {
            background: var(--primary);
            color: white;
        }

        .step-btn.secondary {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        /* Ingredient Quick View */
        .ingredient-panel {
            background: var(--bg-card);
            border-radius: 20px;
            margin: 0 20px 20px;
            overflow: hidden;
        }

        .panel-header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .panel-header h4 {
            font-size: 14px;
            font-weight: 600;
        }

        .panel-header span {
            font-size: 12px;
            color: var(--primary);
            cursor: pointer;
        }

        .ingredient-list {
            padding: 12px 20px 16px;
        }

        .ingredient-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .ingredient-item:last-child {
            border-bottom: none;
        }

        .ingredient-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
        }

        .ingredient-name {
            flex: 1;
            font-size: 14px;
        }

        .ingredient-amount {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Voice Cooking Controls */
        .voice-controls {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 16px;
        }

        .voice-fab {
            width: 56px;
            height: 56px;
            background: var(--primary);
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255,111,0,0.4);
            transition: all 0.2s;
        }

        .voice-fab.listening {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .voice-fab.secondary {
            background: var(--bg-card);
            width: 48px;
            height: 48px;
            font-size: 16px;
        }

        /* ============================================
           PANTRY SCREEN
           ============================================ */

        .pantry-header {
            padding: 0 20px 20px;
        }

        .pantry-header h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .pantry-header p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .search-bar {
            padding: 0 20px;
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px 14px 46px;
            font-size: 14px;
            color: var(--text-primary);
            font-family: inherit;
            outline: none;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-wrapper {
            position: relative;
        }

        .search-wrapper i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .category-tabs {
            padding: 0 20px;
            margin-bottom: 20px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .category-tabs::-webkit-scrollbar {
            display: none;
        }

        .tabs-row {
            display: flex;
            gap: 10px;
            min-width: max-content;
        }

        .tab {
            padding: 10px 18px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .pantry-grid {
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .pantry-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 18px;
            position: relative;
            overflow: hidden;
        }

        .pantry-card .card-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }

        .pantry-card h4 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .pantry-card span {
            font-size: 12px;
            color: var(--text-muted);
        }

        .pantry-card .card-bg {
            position: absolute;
            right: -10px;
            bottom: -10px;
            font-size: 60px;
            opacity: 0.08;
        }

        /* ============================================
           TIMERS SCREEN
           ============================================ */

        .timers-header {
            padding: 0 20px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .timers-header h2 {
            font-size: 22px;
            font-weight: 700;
        }

        .add-timer-btn {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-timer-btn:hover {
            transform: scale(1.05);
        }

        .active-timers {
            padding: 0 20px;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .large-timer-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 14px;
            position: relative;
            overflow: hidden;
        }

        .large-timer-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .timer-header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .timer-title {
            font-size: 18px;
            font-weight: 700;
        }

        .timer-type {
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg-elevated);
            padding: 4px 10px;
            border-radius: 8px;
        }

        .timer-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 6px solid var(--bg-elevated);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            position: relative;
        }

        .timer-circle::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid transparent;
            border-top-color: var(--primary);
            transform: rotate(45deg);
        }

        .timer-circle .time {
            font-size: 36px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .timer-actions-row {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .timer-action-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .timer-action-btn.primary {
            background: var(--primary);
            color: white;
        }

        .timer-action-btn.secondary {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        /* ============================================
           RECIPE DETAIL SCREEN
           ============================================ */

        .recipe-detail-hero {
            width: 100%;
            height: 240px;
            background: linear-gradient(135deg, #2D2D2D, #1A1A1A);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .recipe-detail-hero .play-btn {
            width: 64px;
            height: 64px;
            background: rgba(255,255,255,0.95);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--bg-dark);
        }

        .recipe-detail-hero .duration {
            position: absolute;
            bottom: 16px;
            right: 16px;
            background: rgba(0,0,0,0.8);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
        }

        .back-btn {
            position: absolute;
            top: 16px;
            left: 16px;
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .recipe-detail-content {
            padding: 24px 20px;
            margin-top: -20px;
            background: var(--bg-dark);
            border-radius: 24px 24px 0 0;
            position: relative;
        }

        .recipe-detail-content h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .recipe-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .recipe-stat {
            text-align: center;
        }

        .recipe-stat .value {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
        }

        .recipe-stat .label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .portion-selector {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .portion-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .portion-header h4 {
            font-size: 14px;
            font-weight: 600;
        }

        .portion-buttons {
            display: flex;
            gap: 8px;
        }

        .portion-btn {
            padding: 8px 14px;
            background: var(--bg-elevated);
            border: 2px solid transparent;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .portion-btn.active {
            border-color: var(--primary);
            color: var(--primary);
        }

        .detail-section {
            margin-bottom: 24px;
        }

        .detail-section h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 14px;
        }

        .start-cooking-btn {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 380px;
            padding: 16px;
            background: var(--primary);
            border: none;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 24px rgba(255,111,0,0.4);
            transition: all 0.2s;
        }

        .start-cooking-btn:hover {
            transform: translateX(-50%) scale(1.02);
        }

        /* ============================================
           MISTAKE FIX MODAL
           ============================================ */

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: flex-end;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .fix-modal {
            width: 100%;
            max-width: 420px;
            background: var(--bg-card);
            border-radius: 24px 24px 0 0;
            padding: 28px 24px 40px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-handle {
            width: 40px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 0 auto 20px;
        }

        .fix-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 20px;
        }

        .fix-icon {
            width: 52px;
            height: 52px;
            background: rgba(244,67,54,0.15);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .fix-header h3 {
            font-size: 18px;
            font-weight: 700;
        }

        .fix-header span {
            font-size: 13px;
            color: var(--text-muted);
        }

        .fix-steps {
            margin-bottom: 20px;
        }

        .fix-step {
            display: flex;
            gap: 14px;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
        }

        .fix-step:last-child {
            border-bottom: none;
        }

        .fix-step-num {
            width: 28px;
            height: 28px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .fix-step-text {
            font-size: 14px;
            line-height: 1.5;
        }

        .fix-timer-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 14px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* ============================================
             SCREEN 6: RECIPES LIBRARY
             ============================================ */
        .screen {
            display: none;
            padding-bottom: 100px;
        }

        .screen.active {
            display: block;
        }

        .recipes-header {
            padding: 20px;
        }

        .recipes-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .recipes-title-row h2 {
            font-size: 24px;
            font-weight: 700;
        }

        .search-icon-btn {
            width: 40px;
            height: 40px;
            background: var(--bg-card);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .recipes-filter-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .filter-tab {
            padding: 8px 16px;
            background: var(--bg-card);
            border: none;
            border-radius: 24px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .filter-tab.active {
            background: var(--primary);
            color: white;
        }

        .recipes-grid {
            padding: 0 20px 120px;
        }

        .recipe-list-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 14px;
            display: flex;
            gap: 14px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .recipe-list-card:hover {
            background: var(--bg-elevated);
        }

        .list-thumb {
            width: 80px;
            height: 80px;
            background: var(--bg-elevated);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            flex-shrink: 0;
        }

        .thumb-placeholder {
            font-size: 32px;
        }

        .list-duration {
            position: absolute;
            bottom: 6px;
            right: 6px;
            background: rgba(0,0,0,0.7);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
        }

        .list-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .list-info h4 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .list-meta {
            display: flex;
            gap: 12px;
            margin-bottom: 8px;
        }

        .list-meta span {
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .list-tags {
            display: flex;
            gap: 6px;
        }

        .list-tag {
            background: var(--bg-elevated);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 500;
            color: var(--primary-light);
        }

        .list-tag.veg {
            color: var(--success);
        }

        /* ============================================
             SCREEN 7: PROFILE
             ============================================ */
        .screen {
            display: none;
            padding-bottom: 100px;
        }

        .screen.active {
            display: block;
        }

        .profile-header-section {
            position: relative;
        }

        .profile-cover {
            height: 120px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }

        .profile-avatar-section {
            display: flex;
            align-items: flex-end;
            padding: 0 20px;
            margin-top: -50px;
            gap: 16px;
        }

        .profile-avatar {
            width: 90px;
            height: 90px;
            background: var(--bg-card);
            border-radius: 50%;
            border: 4px solid var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .profile-info {
            padding-top: 50px;
            flex: 1;
        }

        .profile-info h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .profile-email {
            font-size: 13px;
            color: var(--text-secondary);
            display: block;
            margin-bottom: 10px;
        }

        .profile-badges {
            display: flex;
            gap: 8px;
        }

        .badge {
            background: var(--bg-card);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }

        .profile-stats-row {
            display: flex;
            justify-content: space-around;
            padding: 24px 20px;
            margin: 16px 0;
            background: var(--bg-card);
            border-radius: 16px;
            margin: 16px 20px;
        }

        .profile-stat {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: 4px;
        }

        .profile-menu-section {
            padding: 0 20px;
            margin-bottom: 16px;
        }

        .profile-menu-section:last-of-type {
            margin-bottom: 30px;
        }

        .profile-menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: var(--bg-card);
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .profile-menu-item:hover {
            background: var(--bg-elevated);
        }

        .profile-menu-item:active {
            background: var(--bg-elevated);
            transform: scale(0.98);
        }

        .menu-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .menu-left i {
            font-size: 18px;
            color: var(--primary);
            width: 24px;
            text-align: center;
        }

        .menu-left span {
            font-size: 14px;
            font-weight: 500;
        }

        .menu-right {
            display: flex;
            align-items: center;

        .pantry-grid {

        .pantry-card h4 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;

        .pantry-card span {
            font-size: 12px;

        }

            position: absolute;
            right: -10px;
            bottom: -10px;
            font-size: 60px;
            opacity: 0.08;

        /* ============================================
           TIMERS SCREEN
           ============================================ */

            justify-content: space-between;
            align-items: center;
        }

        .timers-header h2 {
            font-size: 22px;
            font-weight: 700;
        }

        .add-timer-btn {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border: none;

            justify-content: center;

            transform: scale(1.05);
        }

        .active-timers {
            padding: 0 20px;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .large-timer-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 14px;
            position: relative;
            overflow: hidden;
        }

            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .timer-header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .timer-title {
            font-size: 18px;
            font-weight: 700;
        }

        .timer-type {
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg-elevated);
            padding: 4px 10px;
            border-radius: 8px;
        }

        .timer-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;

            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            position: relative;
        }

        .timer-circle::before {
            content: '';

            width: 100%;
            height: 100%;

            border: 6px solid transparent;
            border-top-color: var(--primary);
            transform: rotate(45deg);

            font-size: 36px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .timer-actions-row {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .timer-action-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .timer-action-btn.primary {
            background: var(--primary);
            color: white;
        }

        .timer-action-btn.secondary {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

           RECIPE DETAIL SCREEN
           ============================================ */

        .recipe-detail-hero {

            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .recipe-detail-hero .play-btn {

            height: 64px;
            background: rgba(255,255,255,0.95);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--bg-dark);
        }

        .recipe-detail-hero .duration {

            bottom: 16px;
            right: 16px;
            background: rgba(0,0,0,0.8);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
        }

        .back-btn {
            position: absolute;
            top: 16px;
            left: 16px;
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);

        .recipe-detail-content {
            padding: 24px 20px;
            margin-top: -20px;
            background: var(--bg-dark);
            border-radius: 24px 24px 0 0;
            position: relative;
        }

        .recipe-detail-content h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .recipe-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .recipe-stat {
            text-align: center;
        }

        .recipe-stat .value {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
        }

        .recipe-stat .label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .portion-selector {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
        }

            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .portion-header h4 {
            font-size: 14px;
            font-weight: 600;
        }

        .portion-buttons {
            display: flex;
            gap: 8px;
        }

        .portion-btn {
            padding: 8px 14px;
            background: var(--bg-elevated);

            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;

        .portion-btn.active {
            border-color: var(--primary);

        }

        .detail-section {
            margin-bottom: 24px;
        }

        .detail-section h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 14px;
        }

            border-radius: 16px;

            padding: 28px 24px 40px;

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }

        .modal-handle {
            width: 40px;
            height: 4px;
            background: var(--border);

            gap: 14px;
            margin-bottom: 20px;

            width: 52px;

            border-radius: 14px;
            padding: 16px;

            font-weight: 600;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;

            margin-bottom: 12px;
        }

        .about-section p {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .about-section ul {
            margin-bottom: 16px;
        }

        .about-section li {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .about-section a {
            font-size: 13px;
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
        }

        .about-section a:hover {
            color: var(--primary-light);
        }

        /* Screen Switcher (Demo) */
        .screen-switcher {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-card);
            border-radius: 24px 24px 0 0;
            padding: 12px 24px 28px;
            display: flex;
            justify-content: space-around;
            backdrop-filter: blur(20px);
        }

        .screen-switcher button {
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            color: var(--text-secondary);
        }

        .screen-switcher button:hover {
            background: var(--bg-elevated);
        }

        .screen-switcher button.active {
            background: var(--primary);
            color: white;
        }

        /* ============================================
           COOKING MODE SCREEN
           ============================================ */

        .screen {
            display: none;
            padding-bottom: 100px;
        }

        .screen.active {
            display: block;
        }

        /* Cooking Mode Header */
        .cooking-header {
            padding: 0 20px 20px;
            text-align: center;
        }

        .cooking-header h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .cooking-header span {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Step Progress */
        .step-progress {
            padding: 0 20px;
            margin-bottom: 24px;
        }

        .progress-bar {
            height: 6px;
            background: var(--bg-card);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-fill {
            height: 100%;
            width: 37%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .progress-steps {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
        }

        .progress-steps span.current {
            color: var(--primary);
            font-weight: 600;
        }

        /* Current Step Card */
        .step-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 28px 24px;
            margin: 0 20px 20px;
            border: 1px solid var(--border);
        }

        .step-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: var(--primary);
            border-radius: 50%;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .step-card h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .step-card p {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .step-timer {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-elevated);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
        }

        .step-timer i {
            color: var(--secondary);
            font-size: 18px;
        }

        .step-timer span {
            font-size: 16px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .step-actions {
            display: flex;
            gap: 10px;
        }

        .step-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .step-btn.primary {
            background: var(--primary);
            color: white;
        }

        .step-btn.secondary {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        /* Ingredient Quick View */
        .ingredient-panel {
            background: var(--bg-card);
            border-radius: 20px;
            margin: 0 20px 20px;
            overflow: hidden;
        }

        .panel-header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .panel-header h4 {
            font-size: 14px;
            font-weight: 600;
        }

        .panel-header span {
            font-size: 12px;
            color: var(--primary);
            cursor: pointer;
        }

        .ingredient-list {
            padding: 12px 20px 16px;
        }

        .ingredient-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .ingredient-item:last-child {
            border-bottom: none;
        }

        .ingredient-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
        }

        .ingredient-name {
            flex: 1;
            font-size: 14px;
        }

        .ingredient-amount {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Voice Cooking Controls */
        .voice-controls {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 16px;
        }

        .voice-fab {
            width: 56px;
            height: 56px;
            background: var(--primary);
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255,111,0,0.4);
            transition: all 0.2s;
        }

        .voice-fab.listening {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .voice-fab.secondary {
            background: var(--bg-card);
            width: 48px;
            height: 48px;
            font-size: 16px;
        }

        /* ============================================
           PANTRY SCREEN
           ============================================ */

        .pantry-header {
            padding: 0 20px 20px;
        }

        .pantry-header h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .pantry-header p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .search-bar {
            padding: 0 20px;
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px 14px 46px;
            font-size: 14px;
            color: var(--text-primary);
            font-family: inherit;
            outline: none;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-wrapper {
            position: relative;
        }

        .search-wrapper i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .category-tabs {
            padding: 0 20px;
            margin-bottom: 20px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .category-tabs::-webkit-scrollbar {
            display: none;
        }

        .tabs-row {
            display: flex;
            gap: 10px;
            min-width: max-content;
        }

        .tab {
            padding: 10px 18px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .pantry-grid {
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .pantry-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 18px;
            position: relative;
            overflow: hidden;
        }

        .pantry-card .card-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }

        .pantry-card h4 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .pantry-card span {
            font-size: 12px;
            color: var(--text-muted);
        }

        .pantry-card .card-bg {
            position: absolute;
            right: -10px;
            bottom: -10px;
            font-size: 60px;
            opacity: 0.08;
        }

        /* ============================================
           TIMERS SCREEN
           ============================================ */

        .timers-header {
            padding: 0 20        <script>
        function showPrefModal(type) {
            const modal = document.getElementById('pref-modal');
            const title = document.getElementById('pref-modal-title');
            const body = document.getElementById('pref-modal-body');
            const content = {
                'preferences': { title: 'Preferences', body: '<div class="pref-section"><h4>Display</h4><div class="pref-option"><span>Dark Mode</span><div class="toggle-switch active" onclick="this.classList.toggle(\'active\');"></div></div><div class="pref-option"><span>Large Text</span><div class="toggle-switch" onclick="this.classList.toggle(\'active\');"></div></div></div><div class="pref-section"><h4>Voice</h4><div class="pref-option"><span>Wake Word</span><span style="color:#666;font-size:12px;">Hey Chef</span></div><div class="pref-option"><span>Speech Rate</span><select class="pref-select"><option>0.75x</option><option selected>1x</option><option>1.25x</option></select></div></div>' },
                'dietary': { title: 'Dietary Preferences', body: '<div class="pref-section"><h4>Diet Type</h4><div class="dietary-chips"><div class="dietary-chip active">Vegetarian</div><div class="dietary-chip">Non-Veg</div><div class="dietary-chip">Vegan</div><div class="dietary-chip">Jain</div></div></div><div class="pref-section"><h4>Spice Level</h4><div class="dietary-chips"><div class="dietary-chip">Mild</div><div class="dietary-chip active">Medium</div><div class="dietary-chip">Spicy</div></div></div>' },
                'notifications': { title: 'Notifications', body: '<div class="pref-section"><h4>Alerts</h4><div class="pref-option"><span>Timer Alerts</span><div class="toggle-switch active" onclick="this.classList.toggle(\'active\');"></div></div><div class="pref-option"><span>Step Reminders</span><div class="toggle-switch active" onclick="this.classList.toggle(\'active\');"></div></div><div class="pref-option"><span>Voice Guidance</span><div class="toggle-switch active" onclick="this.classList.toggle(\'active\');"></div></div></div>' },
                'language': { title: 'Language', body: '<div class="pref-section"><h4>App Language</h4><div class="dietary-chips"><div class="dietary-chip active">English</div><div class="dietary-chip">Hindi</div><div class="dietary-chip">Marathi</div></div></div>' },
                'about': { title: 'About', body: '<div class="pref-section"><p style="font-size:13px;color:#888;line-height:1.6;">Version 2.1.0<br>Smart Cooking Assistant<br>Your hands-free cooking companion</p></div>' }
            };
            title.textContent = content[type]?.title || 'Settings';
            body.innerHTML = content[type]?.body || '';
            modal.classList.add('active');
        }
        function closePrefModal() { document.getElementById('pref-modal').classList.remove('active'); }
        function closeNotifModal() { document.getElementById('notif-modal').classList.remove('active'); }
        function closeHelpModal() { document.getElementById('help-modal').classList.remove('active'); }
        document.querySelectorAll('.profile-menu-item').forEach(item => {
            item.addEventListener('click', function() {
                const label = this.querySelector('span')?.textContent;
                if (label?.includes('Preference')) showPrefModal('preferences');
                else if (label?.includes('Diet')) showPrefModal('dietary');
                else if (label?.includes('Notific')) showPrefModal('notifications');
                else if (label?.includes('Language')) showPrefModal('language');
                else if (label?.includes('About')) showPrefModal('about');
            });
        });
        </script>
</body>
</html>
