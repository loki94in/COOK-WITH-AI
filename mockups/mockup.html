
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1A1A1A; --card: #2D2D2D; --card2: #383838;
    --accent: #FF6F00; --success: #4CAF50; --text: #FFFFFF;
    --text2: #B0B0B0; --text3: #757575; --radius: 12px;
  }
  body { background: #000; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }

  .phone-frame {
    width: 340px; height: 620px; background: var(--bg); border-radius: 32px;
    overflow: hidden; border: 2px solid #3A3A3A; position: relative; display: flex; flex-direction: column;
  }
  .screen { display: none !important; flex-direction: column; height: 100%; position: absolute; top: 24px; left: 0; right: 0; bottom: 0; }
  .screen.active { display: flex !important; }

  /* UI Parts */
  .content { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 80px; }
  .bottom-nav { position: absolute; bottom: 0; left: 0; right: 0; display: flex; background: var(--card); padding: 10px 0; border-top: 1px solid #333; z-index: 10; }
  .nav-item { flex: 1; text-align: center; color: var(--text3); font-size: 10px; cursor: pointer; }
  .nav-item.active { color: var(--accent); }
  .nav-item span { display: block; font-size: 18px; margin-bottom: 2px; }

  .card { background: var(--card); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
  .section-title { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  
  .primary-btn { width: 100%; background: var(--accent); border: none; border-radius: 8px; padding: 12px; color: #fff; font-weight: 700; cursor: pointer; font-family: 'Syne'; }
  .primary-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .recipe-item { background: var(--card2); padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
  .recipe-emoji { font-size: 24px; }
  
  .toast { position: absolute; bottom: 80px; left: 20px; right: 20px; background: var(--card2); border: 1px solid var(--accent); color: #fff; padding: 12px; border-radius: 8px; font-size: 11px; text-align: center; transform: translateY(100px); opacity: 0; transition: 0.3s; z-index: 100; }
  .toast.show { transform: translateY(0); opacity: 1; }
</style>

<div class="phone-frame">
  <div class="screen active" id="screen-splash">
    <div class="content" style="display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;">
      <div style="font-size:60px;">👨‍🍳</div>
      <h1 style="color:white; font-family:'Syne'; margin-top:10px;">Chef AI</h1>
      <button type="button" class="primary-btn" id="btn-get-started" style="margin-top:40px;">GET STARTED</button>
    </div>
  </div>

  <div class="screen" id="screen-home">
    <div class="content">
      <div class="card">
        <div class="section-title">New Recipe URL</div>
        <div style="display:flex; gap:8px; margin-top:8px;">
          <input type="text" id="input-url" style="flex:1; background:#111; border:1px solid #444; color:#fff; border-radius:6px; padding:8px; font-size:11px;" placeholder="Paste YouTube link...">
          <button type="button" id="btn-extract" style="background:var(--accent); border:none; color:white; padding:0 12px; border-radius:6px; font-size:10px; font-weight:600;">EXTRACT</button>
        </div>
      </div>
      <div class="section-title">Your Recipes</div>
      <div id="container-recipes"></div>
    </div>
    <div class="bottom-nav">
      <div class="nav-item active" data-screen="home"><span>🏠</span>Home</div>
      <div class="nav-item" data-screen="pantry"><span>🛒</span>Pantry</div>
    </div>
  </div>

  <div class="screen" id="screen-pantry">
    <div class="content">
      <div class="section-title">Stocked Items</div>
      <div id="container-pantry"></div>
    </div>
    <div class="bottom-nav">
      <div class="nav-item" data-screen="home"><span>🏠</span>Home</div>
      <div class="nav-item active" data-screen="pantry"><span>🛒</span>Pantry</div>
    </div>
  </div>

  <div class="toast" id="main-toast"></div>
</div>

<script>
/**
 * CHEF AI: EVENT-DRIVEN INTEGRATION
 * This script connects UI elements to backend functions using listeners.
 */

const App = {
  state: {
    recipes: JSON.parse(localStorage.getItem('recipes') || '[]'),
    pantry: [
      { id: 1, name: 'Onion', stock: true },
      { id: 2, name: 'Garlic', stock: false },
      { id: 3, name: 'Chili', stock: true }
    ],
    currentScreen: 'splash'
  },

  // 1. INITIALIZATION & EVENT BINDING
  init() {
    // Bind Static Buttons
    document.getElementById('btn-get-started').addEventListener('click', () => this.navigateTo('home'));
    document.getElementById('btn-extract').addEventListener('click', () => this.handleExtraction());

    // Bind Navigation Items
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => this.navigateTo(item.dataset.screen));
    });

    this.render();
  },

  // 2. BACKEND FUNCTIONS (DATA LOGIC)
  async handleExtraction() {
    const btn = document.getElementById('btn-extract');
    const input = document.getElementById('input-url');
    
    if (!input.value.includes('youtube.com')) {
      this.notify('⚠️ Invalid URL');
      return;
    }

    // LOADING STATE START
    btn.disabled = true;
    btn.textContent = '...';
    this.notify('👨‍🍳 Analyzing video steps...');

    try {
      await new Promise(r => setTimeout(r, 2000)); // Simulating AI Analysis
      
      const newRecipe = {
        id: Date.now(),
        name: 'extracted_recipe_' + (this.state.recipes.length + 1),
        icon: '🍛'
      };

      this.state.recipes.unshift(newRecipe);
      localStorage.setItem('recipes', JSON.stringify(this.state.recipes));
      
      input.value = '';
      this.notify('✅ Successfully extracted!');
      this.render();
    } catch (e) {
      this.notify('❌ Extraction failed');
    } finally {
      btn.disabled = false;
      btn.textContent = 'EXTRACT';
    }
  },

  togglePantryItem(id) {
    this.state.pantry = this.state.pantry.map(i => 
      i.id === id ? { ...i, stock: !i.stock } : i
    );
    this.notify('Pantry updated');
    this.render();
  },

  // 3. UI RENDERING LOGIC (DYNAMIC DOM UPDATES)
  render() {
    // Screen Management
    document.querySelectorAll('.screen').forEach(s => {
      s.classList.toggle('active', s.id === `screen-${this.state.currentScreen}`);
    });

    // Render Recipes
    const recipeBox = document.getElementById('container-recipes');
    if (recipeBox) {
      recipeBox.innerHTML = this.state.recipes.length ? this.state.recipes.map(r => `
        <div class="recipe-item">
          <div class="recipe-emoji">${r.icon}</div>
          <div style="color:white; font-size:12px;">Recipe ID: ${r.id}</div>
        </div>
      `).join('') : '<p style="color:#555; font-size:10px; text-align:center;">No recipes yet</p>';
    }

    // Render Pantry (Dynamic Binding for new elements)
    const pantryBox = document.getElementById('container-pantry');
    if (pantryBox) {
      pantryBox.innerHTML = this.state.pantry.map(i => `
        <div class="card" style="display:flex; justify-content:space-between; align-items:center; cursor:pointer;" onclick="App.togglePantryItem(${i.id})">
          <span style="color:#fff; font-size:12px;">${i.name}</span>
          <span style="color:${i.stock ? '#4CAF50' : '#444'}; font-size:14px;">${i.stock ? '●' : '○'}</span>
        </div>
      `).join('');
    }
  },

  // 4. NAVIGATION & UTILS
  navigateTo(id) {
    this.state.currentScreen = id;
    this.render();
  },

  notify(msg) {
    const t = document.getElementById('main-toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
};

// Start the app when DOM is ready
document.addEventListener('DOMContentLoaded', () => App.init());
</script>
